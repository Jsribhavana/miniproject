services:
  - type: web
    name: employee-management-system
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn employee_management.wsgi:application"
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: admin123
